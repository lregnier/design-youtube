name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  api:
    name: API — lint, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/api/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  worker:
    name: Worker — lint, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/worker/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  publish:
    name: Build & push Docker images to ECR
    runs-on: ubuntu-latest
    needs: [api, worker, frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/design-youtube-api:${{ github.sha }} \
            -f backend/api/Dockerfile.api backend/api/
          docker push $REGISTRY/design-youtube-api:${{ github.sha }}
          docker tag $REGISTRY/design-youtube-api:${{ github.sha }} \
            $REGISTRY/design-youtube-api:latest
          docker push $REGISTRY/design-youtube-api:latest

      - name: Build & push worker image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/design-youtube-worker:${{ github.sha }} \
            backend/worker/
          docker push $REGISTRY/design-youtube-worker:${{ github.sha }}
          docker tag $REGISTRY/design-youtube-worker:${{ github.sha }} \
            $REGISTRY/design-youtube-worker:latest
          docker push $REGISTRY/design-youtube-worker:latest

      - name: Build & push frontend image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/design-youtube-frontend:${{ github.sha }} frontend/web/
          docker push $REGISTRY/design-youtube-frontend:${{ github.sha }}
          docker tag $REGISTRY/design-youtube-frontend:${{ github.sha }} \
            $REGISTRY/design-youtube-frontend:latest
          docker push $REGISTRY/design-youtube-frontend:latest
