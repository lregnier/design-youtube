include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

queues {
  "video-processing-dlq.fifo" {
    defaultVisibilityTimeout = 900 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
    fifo = true
    contentBasedDeduplication = true
  }
  "video-processing.fifo" {
    defaultVisibilityTimeout = 900 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
    fifo = true
    contentBasedDeduplication = true
    deadLettersQueue {
      name = "video-processing-dlq.fifo"
      maxReceiveCount = 3
    }
  }
  "video-processing-results-dlq.fifo" {
    defaultVisibilityTimeout = 900 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
    fifo = true
    contentBasedDeduplication = true
  }
  "video-processing-results.fifo" {
    defaultVisibilityTimeout = 900 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
    fifo = true
    contentBasedDeduplication = true
    deadLettersQueue {
      name = "video-processing-results-dlq.fifo"
      maxReceiveCount = 3
    }
  }
}

aws {
  accountId = "000000000000"
  region = "us-east-1"
}
